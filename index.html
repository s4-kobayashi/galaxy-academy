<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スターウォーズ学習アカデミー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root {
  --void: #02050e;
  --deep: #060c1a;
  --nebula: #0a1628;
  --star-blue: #1a3560;
  --saber: #4fc3f7;
  --saber-glow: rgba(79,195,247,0.35);
  --gold: #ffd740;
  --gold-glow: rgba(255,215,64,0.4);
  --green: #69f0ae;
  --text: #dde8f5;
  --text-dim: #6b85b5;
  --text-muted: #3a4f78;
  --border: rgba(79,195,247,0.12);
  --border-active: rgba(79,195,247,0.4);
  --left-w: 200px;
  --right-w: 280px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Noto Sans JP',sans-serif; background:var(--void); color:var(--text); overflow:hidden; }

/* Stars */
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.s { position:absolute; background:#fff; border-radius:50%; animation:tw var(--d) ease-in-out infinite; animation-delay:var(--dl); }
@keyframes tw { 0%,100%{opacity:var(--o)} 50%{opacity:0.05} }

/* Layout */
#layout {
  position:relative; z-index:1;
  display:grid;
  grid-template-columns: var(--left-w) 1fr var(--right-w);
  grid-template-rows: 52px 1fr;
  height:100vh;
}

/* Header */
#hdr {
  grid-column:1/4; grid-row:1;
  display:flex; align-items:center; justify-content:center; gap:16px;
  border-bottom:1px solid var(--border);
  background:rgba(2,5,14,0.95); backdrop-filter:blur(12px);
  padding:0 20px;
}
.hdr-line { height:1px; flex:1; max-width:100px; background:linear-gradient(90deg,transparent,var(--saber)); }
.hdr-line.r { background:linear-gradient(90deg,var(--saber),transparent); }
.hdr-title { font-family:'Noto Serif JP',serif; font-size:16px; font-weight:900; letter-spacing:0.2em; color:var(--gold); text-shadow:0 0 16px var(--gold-glow); white-space:nowrap; }

/* LEFT */
#left {
  grid-column:1; grid-row:2;
  border-right:1px solid var(--border);
  background:var(--deep);
  display:flex; flex-direction:column;
  padding:18px 10px 18px;
  gap:8px; overflow-y:auto;
}
.sec-label { font-size:9px; letter-spacing:0.25em; color:var(--text-muted); text-transform:uppercase; font-family:'DotGothic16',monospace; padding:0 6px; margin-bottom:2px; }
.nav-btn {
  display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px;
  border-radius:9px; border:1px solid var(--border); background:transparent;
  color:var(--text-dim); font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.18s; text-align:left;
}
.nav-btn:hover { background:rgba(79,195,247,0.08); border-color:var(--border-active); color:var(--saber); box-shadow:0 0 10px rgba(79,195,247,0.1); }
.nav-btn .ic { font-size:15px; flex-shrink:0; }
.divider { height:1px; background:var(--border); margin:4px 0; }
#stock-left { flex:1; overflow-y:auto; padding:2px 0; }
.sw {
  display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:6px;
  font-size:12px; color:var(--saber); cursor:pointer; transition:background 0.15s;
}
.sw:hover { background:rgba(79,195,247,0.08); }
.sw::before { content:''; width:4px; height:4px; background:var(--saber); border-radius:50%; flex-shrink:0; box-shadow:0 0 4px var(--saber); }
.sw-empty { font-size:11px; color:var(--text-muted); padding:4px 8px; }

/* MAIN */
#main { grid-column:2; grid-row:2; display:flex; flex-direction:column; overflow:hidden; }
#chat { flex:1; overflow-y:auto; padding:24px 28px 8px; display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth; }

.msg { display:flex; gap:10px; animation:mi 0.28s ease; }
@keyframes mi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:3px; }
.msg.ai .av { background:linear-gradient(135deg,#1a3a6e,#0d1f45); border:1px solid var(--border-active); box-shadow:0 0 8px var(--saber-glow); }
.msg.user .av { background:linear-gradient(135deg,#1a3d1a,#0d220d); border:1px solid rgba(105,240,174,0.3); }
.bbl { max-width:calc(100% - 48px); padding:13px 17px; border-radius:16px; font-size:14px; line-height:1.85; white-space:pre-wrap; }
.msg.ai .bbl { background:rgba(10,22,40,0.75); border:1px solid var(--border); border-top-left-radius:4px; }
.msg.user .bbl { background:rgba(79,195,247,0.1); border:1px solid rgba(79,195,247,0.2); border-top-right-radius:4px; color:#c8e6ff; }

.dots { display:inline-flex; gap:4px; padding:4px 0; }
.dots span { width:6px; height:6px; background:var(--saber); border-radius:50%; animation:dot 1.2s ease-in-out infinite; }
.dots span:nth-child(2){animation-delay:0.2s} .dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }

#input-bar { padding:12px 28px 16px; background:linear-gradient(to top,var(--void) 60%,transparent); }
.irow { display:flex; gap:8px; background:var(--nebula); border:1px solid var(--border); border-radius:26px; padding:6px 6px 6px 18px; transition:all 0.2s; }
.irow:focus-within { border-color:var(--border-active); box-shadow:0 0 18px rgba(79,195,247,0.1); }
#ui { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; resize:none; max-height:96px; min-height:34px; line-height:1.6; padding:5px 0; }
#ui::placeholder { color:var(--text-muted); }
#sb { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--saber),var(--star-blue)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; box-shadow:0 0 10px var(--saber-glow); }
#sb:hover { transform:scale(1.07); box-shadow:0 0 20px rgba(79,195,247,0.5); }
#sb svg { color:white; }

/* RIGHT */
#right { grid-column:3; grid-row:2; border-left:1px solid var(--border); background:var(--deep); display:flex; flex-direction:column; overflow:hidden; }
.rhdr { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
.rtitle { font-size:10px; letter-spacing:0.22em; color:var(--text-muted); text-transform:uppercase; font-family:'DotGothic16',monospace; margin-bottom:10px; }
#lkform { display:flex; gap:6px; }
#lkinput { flex:1; background:rgba(0,0,0,0.35); border:1px solid var(--border); border-radius:8px; padding:7px 11px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; min-width:0; }
#lkinput:focus { border-color:var(--border-active); }
#lkinput::placeholder { color:var(--text-muted); }
#lkbtn { padding:7px 11px; border-radius:8px; background:rgba(79,195,247,0.12); border:1px solid var(--border-active); color:var(--saber); font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.18s; }
#lkbtn:hover { background:rgba(79,195,247,0.22); }

#rscroll { flex:1; overflow-y:auto; padding:14px 14px; display:flex; flex-direction:column; gap:10px; }
.wcard { background:rgba(79,195,247,0.04); border:1px solid var(--border); border-radius:12px; padding:14px; animation:ci 0.25s ease; }
@keyframes ci { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.wc-title { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; color:var(--gold); text-shadow:0 0 10px var(--gold-glow); margin-bottom:11px; }
.wc-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:7px; font-size:12px; line-height:1.65; }
.wc-lbl { font-family:'DotGothic16',monospace; font-size:9px; letter-spacing:0.15em; color:var(--saber); text-transform:uppercase; padding:2px 5px; border:1px solid var(--border-active); border-radius:4px; flex-shrink:0; margin-top:1px; }
.wc-val { color:var(--text); }
.wc-stocked { margin-top:10px; padding-top:8px; border-top:1px solid var(--border); font-size:10px; color:var(--green); display:flex; align-items:center; gap:5px; }
.rloading { display:flex; align-items:center; gap:8px; padding:8px 2px; font-size:12px; color:var(--text-muted); }
.rhint { background:rgba(255,215,64,0.04); border:1px dashed rgba(255,215,64,0.15); border-radius:10px; padding:14px; font-size:12px; color:var(--text-muted); line-height:1.8; }
.rhint strong { color:var(--gold); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--star-blue); border-radius:2px; }

/* Clear stock button */
.clear-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:7px 10px; border-radius:7px;
  border:1px solid rgba(255,82,82,0.2); background:transparent;
  color:rgba(255,82,82,0.5); font-family:'Noto Sans JP',sans-serif;
  font-size:11px; cursor:pointer; transition:all 0.18s; margin-top:4px;
}
.clear-btn:hover { border-color:rgba(255,82,82,0.5); color:#ff5252; background:rgba(255,82,82,0.06); }

.rank-btn {
  display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px;
  border-radius:9px; border:1px solid rgba(255,215,64,0.2);
  background:rgba(255,215,64,0.04);
  color:var(--gold); font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.18s; text-align:left;
}
.rank-btn:hover { background:rgba(255,215,64,0.1); border-color:rgba(255,215,64,0.5); box-shadow:0 0 12px var(--gold-glow); }
.rank-btn .ic { font-size:15px; flex-shrink:0; }

.streak-badge {
  display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:8px;
  background:rgba(255,152,0,0.08); border:1px solid rgba(255,152,0,0.2);
  font-size:11px; color:#ffb74d; margin-top:2px;
}
.streak-num { font-family:'DotGothic16',monospace; font-size:16px; color:#ff9800; line-height:1; }

.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px); z-index:100;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.rank-modal {
  background:var(--deep); border:1px solid rgba(255,215,64,0.3);
  border-radius:20px; padding:32px 28px; max-width:400px; width:90%;
  box-shadow:0 0 60px rgba(255,215,64,0.1);
  animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

.modal-close {
  position:absolute; top:14px; right:16px;
  background:none; border:none; color:var(--text-muted);
  font-size:20px; cursor:pointer; line-height:1; transition:color 0.15s;
}
.modal-close:hover { color:var(--text); }

.rank-emblem { text-align:center; margin-bottom:20px; }
.rank-icon { font-size:56px; display:block; margin-bottom:8px; filter:drop-shadow(0 0 16px var(--gold-glow)); }
.rank-name { font-family:'Noto Serif JP',serif; font-size:20px; font-weight:900; color:var(--gold); letter-spacing:0.1em; text-shadow:0 0 16px var(--gold-glow); }
.rank-title-sub { font-size:11px; color:var(--text-muted); margin-top:4px; letter-spacing:0.15em; }

.xp-section { margin:18px 0 14px; }
.xp-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.xp-bar-bg { height:8px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
.xp-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg, var(--saber), var(--gold)); box-shadow:0 0 8px var(--saber-glow); transition:width 1s cubic-bezier(0.25,1,0.5,1); }

.stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:18px; }
.stat-box { background:rgba(79,195,247,0.05); border:1px solid var(--border); border-radius:10px; padding:10px 8px; text-align:center; }
.stat-num { font-family:'DotGothic16',monospace; font-size:20px; color:var(--saber); line-height:1.2; }
.stat-lbl { font-size:9px; color:var(--text-muted); margin-top:3px; letter-spacing:0.1em; }

.next-rank { background:rgba(255,215,64,0.05); border:1px dashed rgba(255,215,64,0.2); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--text-dim); line-height:1.7; }
.next-rank strong { color:var(--gold); }

.modal-streak { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,152,0,0.06); border:1px solid rgba(255,152,0,0.2); border-radius:10px; margin-bottom:16px; }
.modal-streak-num { font-family:'DotGothic16',monospace; font-size:28px; color:#ff9800; }
.modal-streak-txt { font-size:12px; color:#ffb74d; line-height:1.6; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(255,215,64,0.15); border:1px solid rgba(255,215,64,0.4);
  border-radius:12px; padding:12px 20px; font-size:13px; color:var(--gold); z-index:200;
  animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap; backdrop-filter:blur(10px); box-shadow:0 0 20px rgba(255,215,64,0.15);
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

.confirm-modal {
  background:var(--deep); border:1px solid rgba(255,82,82,0.3);
  border-radius:16px; padding:24px; max-width:300px; width:90%;
  animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1); text-align:center;
}
.confirm-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:8px; }
.confirm-sub { font-size:12px; color:var(--text-muted); margin-bottom:20px; line-height:1.6; }
.confirm-btns { display:flex; gap:10px; justify-content:center; }
.btn-cancel { padding:8px 20px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:13px; cursor:pointer; transition:all 0.15s; }
.btn-cancel:hover { border-color:var(--border-active); color:var(--text); }
.btn-danger { padding:8px 20px; border-radius:8px; border:1px solid rgba(255,82,82,0.4); background:rgba(255,82,82,0.1); color:#ff5252; font-size:13px; cursor:pointer; transition:all 0.15s; font-weight:700; }
.btn-danger:hover { background:rgba(255,82,82,0.2); }

@media (max-width:768px) {
  :root { --left-w:50px; --right-w:50px; }
  .nav-btn span:not(.ic) { display:none; }
  .sec-label { display:none; }
  #stock-left { display:none; }
  .rtitle { display:none; }
  #lkform { flex-direction:column; }
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="layout">

  <header id="hdr">
    <div class="hdr-line"></div>
    <div class="hdr-title">🌌 スターウォーズ学習アカデミー</div>
    <div class="hdr-line r"></div>
  </header>

  <!-- LEFT -->
  <aside id="left">
    <div class="sec-label">メニュー</div>
    <button class="nav-btn" onclick="quickSend('小説を生成して')"><span class="ic">📖</span><span>小説を生成して</span></button>
    <button class="nav-btn" onclick="quickSend('問題を出して')"><span class="ic">📝</span><span>問題を出して</span></button>
    <button class="nav-btn" onclick="quickSend('新しい小説')"><span class="ic">🔄</span><span>新しい小説</span></button>
    <div class="divider"></div>
    <button class="rank-btn" onclick="showRankModal()"><span class="ic">🏆</span><span>ジェダイランク</span></button>
    <div id="streak-badge" class="streak-badge" style="display:none">
      <span class="streak-num" id="streak-num">0</span>
      <span>日連続修行中🔥</span>
    </div>
    <div class="divider"></div>
    <div class="sec-label">語句ストック</div>
    <div id="stock-left"><div class="sw-empty">まだありません</div></div>
    <button class="clear-btn" id="clear-btn" onclick="confirmClear()" style="display:none">🗑 ストックをクリア</button>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="chat"></div>
    <div id="input-bar">
      <div class="irow">
        <textarea id="ui" placeholder="答えを入力、または自由にメッセージを送れます..." rows="1"></textarea>
        <button id="sb" onclick="sendMsg()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- RIGHT -->
  <aside id="right">
    <div class="rhdr">
      <div class="rtitle">🔍 語句・漢字を調べる</div>
      <div id="lkform">
        <input id="lkinput" type="text" placeholder="例：葛藤、凛々しい…" />
        <button id="lkbtn" onclick="lookupWord()">調べる</button>
      </div>
    </div>
    <div id="rscroll">
      <div class="rhint">
        <strong>使い方</strong><br>
        小説を読んでいてわからない語句・漢字を上の入力欄に入力して「調べる」を押してください。<br><br>
        読み・意味・例文をここに表示します。調べた語句は自動でストックされ、問題に出題されます。
      </div>
    </div>
  </aside>

</div>
<script>
// ── Rank system data ──────────────────────────────────────
const RANKS = [
  { id:'youngling',   name:'ヤング・パダワン', icon:'🌱', min:0,    xpNeeded:50,  desc:'銀河の学びへの第一歩を踏み出した。' },
  { id:'padawan',     name:'パダワン',         icon:'⚔️',  min:50,   xpNeeded:150, desc:'フォースの素質が芽生えている。' },
  { id:'knight',      name:'ジェダイ・ナイト', icon:'🔵',  min:150,  xpNeeded:350, desc:'フォースを使いこなす力が育っている。' },
  { id:'master',      name:'ジェダイ・マスター',icon:'🟡', min:350,  xpNeeded:700, desc:'銀河の叡智を体得しつつある。' },
  { id:'grandmaster', name:'グランドマスター',  icon:'⚡',  min:700,  xpNeeded:1200,desc:'フォースと完全に一体化している。' },
  { id:'force',       name:'フォースの申し子',  icon:'🌌',  min:1200, xpNeeded:9999,desc:'銀河の歴史に名を刻む究極の修行者。' },
];

function getRankForXP(xp) {
  for(let i=RANKS.length-1;i>=0;i--){ if(xp>=RANKS[i].min) return RANKS[i]; }
  return RANKS[0];
}

// ── localStorage persistence ───────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('ga_progress')||'{}'); } catch(e){ return {}; }
}
function saveProgress(p) {
  localStorage.setItem('ga_progress', JSON.stringify(p));
}

function getProgress() {
  const p = loadProgress();
  return {
    xp: p.xp || 0,
    streak: p.streak || 0,
    lastDate: p.lastDate || '',
    totalDays: p.totalDays || 0,
    totalWords: p.totalWords || 0,
    totalCorrect: p.totalCorrect || 0,
    totalQuestions: p.totalQuestions || 0,
  };
}

// XP rewards
const XP = { daily:20, word:5, correct:10, story:15 };

function addXP(amount, reason) {
  const p = getProgress();
  p.xp += amount;
  saveProgress(p);
  updateStreakBadge();
  showToast(`+${amount} XP ⚡ ${reason}`);
}

// Daily login streak
function checkDailyLogin() {
  const p = getProgress();
  const today = new Date().toDateString();
  if(p.lastDate === today) { updateStreakBadge(); return; }
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if(p.lastDate === yesterday) { p.streak = (p.streak||0)+1; }
  else if(p.lastDate !== today) { p.streak = 1; }
  p.lastDate = today;
  p.totalDays = (p.totalDays||0)+1;
  p.xp = (p.xp||0) + XP.daily + (p.streak>1 ? Math.min(p.streak*2,30) : 0);
  saveProgress(p);
  updateStreakBadge();
  const bonus = p.streak>1 ? `（連続${p.streak}日ボーナス +${Math.min(p.streak*2,30)} XP！）` : '';
  setTimeout(()=>showToast(`🌅 本日のログインボーナス +${XP.daily} XP ${bonus}`), 800);
}

function updateStreakBadge() {
  const p = getProgress();
  const badge = document.getElementById('streak-badge');
  const num = document.getElementById('streak-num');

const LKSYS=`あなたは語句・漢字の解説をする先生です。ユーザーが語句を送ったら、必ず以下のJSON形式のみで返答してください。他の文字・記号・マークダウンは一切含めないでください：

// Helpers
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollBottom(){const c=document.getElementById('chat');c.scrollTo({top:c.scrollHeight,behavior:'smooth'});}

function addMsg(role,text){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  d.innerHTML=`<div class="av">${role==='ai'?'🌌':'👤'}</div><div class="bbl">${esc(text)}</div>`;
  c.appendChild(d);
  scrollBottom();
}

function showLoad(){
  const c=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg ai';d.id='ldg';
  d.innerHTML='<div class="av">🌌</div><div class="bbl"><div class="dots"><span></span><span></span><span></span></div></div>';
  c.appendChild(d);scrollBottom();
}
function hideLoad(){document.getElementById('ldg')?.remove();}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity 0.5s'; t.style.opacity='0'; setTimeout(()=>t.remove(),500); },3000);
}

// ── Rank modal ─────────────────────────────────────────────
function showRankModal() {
  const p = getProgress();
  const rank = getRankForXP(p.xp);
  const rankIdx = RANKS.findIndex(r=>r.id===rank.id);
  const nextRank = RANKS[rankIdx+1];
  const xpInLevel = p.xp - rank.min;
  const xpForNext = rank.xpNeeded - rank.min;
  const pct = nextRank ? Math.min(100, Math.round((xpInLevel/xpForNext)*100)) : 100;

  const streakMsg = p.streak>=2
    ? `<div class="modal-streak"><span class="modal-streak-num">🔥${p.streak}</span><div class="modal-streak-txt"><strong style="color:#ff9800">${p.streak}日連続修行中！</strong><br>毎日続けるとボーナスXPが増えます</div></div>`
    : '';

  const nextMsg = nextRank
    ? `次のランク <strong>${nextRank.icon} ${nextRank.name}</strong> まであと <strong>${nextRank.min - p.xp} XP</strong>。<br>語句を調べる・問題に正解するたびにXPが貯まります！`
    : `<strong>最高ランク到達！</strong> フォースと完全に一体化しています。`;

  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='rank-modal-overlay';
  overlay.innerHTML=`
    <div class="rank-modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="rank-emblem">
        <span class="rank-icon">${rank.icon}</span>
        <div class="rank-name">${rank.name}</div>
        <div class="rank-title-sub">${rank.desc}</div>
      </div>
      ${streakMsg}
      <div class="xp-section">
        <div class="xp-label"><span>経験値 (XP)</span><span>${p.xp} XP</span></div>
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-fill" style="width:0%"></div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${p.totalDays||0}</div><div class="stat-lbl">修行日数</div></div>
        <div class="stat-box"><div class="stat-num">${p.totalWords||0}</div><div class="stat-lbl">習得語句</div></div>
        <div class="stat-box"><div class="stat-num">${p.totalQuestions>0?Math.round((p.totalCorrect/p.totalQuestions)*100):0}%</div><div class="stat-lbl">正答率</div></div>
      </div>
      <div class="next-rank">${nextMsg}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  setTimeout(()=>{ const f=document.getElementById('xp-fill'); if(f) f.style.width=pct+'%'; },100);
}

function closeModal() {
  const o=document.getElementById('rank-modal-overlay')||document.getElementById('confirm-modal-overlay');
  if(o){ o.style.opacity='0'; o.style.transition='opacity 0.2s'; setTimeout(()=>o.remove(),200); }
}

// ── Confirm clear ──────────────────────────────────────────
function confirmClear() {
  const overlay=document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='confirm-modal-overlay';
  overlay.innerHTML=`
    <div class="confirm-modal">
      <div class="confirm-title">🗑 ストックをクリア</div>
      <div class="confirm-sub">調べた語句をすべて削除します。<br>この操作は元に戻せません。</div>
      <div class="confirm-btns">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-danger" onclick="clearStock()">クリアする</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
}

function clearStock() {
  stocked=[];
  updateStock();
  // Also clear word cards in right panel
  const rs=document.getElementById('rscroll');
  rs.querySelectorAll('.wcard').forEach(c=>c.remove());
  if(!rs.querySelector('.rhint')){
    const h=document.createElement('div');h.className='rhint';
    h.innerHTML='<strong>使い方</strong><br>小説を読んでいてわからない語句・漢字を上の入力欄に入力して「調べる」を押してください。<br><br>読み・意味・例文をここに表示します。';
    rs.appendChild(h);
  }
  closeModal();
  showToast('🗑 語句ストックをクリアしました');
}

function updateStock(){
  const el=document.getElementById('stock-left');
  el.innerHTML=stocked.length===0
    ?'<div class="sw-empty">まだありません</div>'
    :stocked.map(w=>`<div class="sw" onclick="prefill('${esc(w)}')">${esc(w)}</div>`).join('');
  const cb=document.getElementById('clear-btn');
  if(cb) cb.style.display=stocked.length>0?'flex':'none';
}
function prefill(w){document.getElementById('lkinput').value=w;document.getElementById('lkinput').focus();}

function showRLoad(){
  const rs=document.getElementById('rscroll');
  const d=document.createElement('div');d.className='rloading';d.id='rldg';
  d.innerHTML='<div class="dots"><span></span><span></span><span></span></div><span>調べています…</span>';
  rs.insertBefore(d,rs.firstChild);
}
function hideRLoad(){document.getElementById('rldg')?.remove();}

function addCard(data,isNew){
  const rs=document.getElementById('rscroll');
  rs.querySelector('.rhint')?.remove();
  const c=document.createElement('div');c.className='wcard';
  c.innerHTML=`
    <div class="wc-title">${esc(data.word)}</div>
    <div class="wc-row"><span class="wc-lbl">読み</span><span class="wc-val">${esc(data.reading||'―')}</span></div>
    <div class="wc-row"><span class="wc-lbl">意味</span><span class="wc-val">${esc(data.meaning||'―')}</span></div>
    <div class="wc-row"><span class="wc-lbl">例文</span><span class="wc-val">${esc(data.example||'―')}</span></div>
    ${isNew?'<div class="wc-stocked">💾 ストック済み！問題に出題されます</div>':''}
  `;
  rs.insertBefore(c,rs.firstChild);
  rs.scrollTo({top:0,behavior:'smooth'});
}

// Lookup
async function lookupWord(){
  const inp=document.getElementById('lkinput');
  const word=inp.value.trim();
  if(!word||looking)return;
  inp.value=''; looking=true;
  showRLoad();
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:400,system:LKSYS,messages:[{role:'user',content:word}]})});
    const d=await r.json();
    hideRLoad();
    let txt=d?.content?.[0]?.text||'';
    txt=txt.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(txt);}catch(e){parsed={word,reading:'―',meaning:txt||'解析できませんでした',example:''};}
    const isNew=!stocked.includes(parsed.word);
    if(isNew){stocked.push(parsed.word);updateStock();const pg=getProgress();pg.totalWords=(pg.totalWords||0)+1;saveProgress(pg);addXP(XP.word,'語句を習得');}
    addCard(parsed,isNew);
  }catch(err){
    hideRLoad();
    const rs=document.getElementById('rscroll');
    const e=document.createElement('div');e.className='rhint';e.style.borderColor='rgba(255,82,82,0.3)';
    e.innerHTML=`⚠️ エラー: ${esc(err.message)}`;rs.insertBefore(e,rs.firstChild);
  }
  looking=false;
}

// Main chat
async function callAI(msg){
  hist.push({role:'user',content:msg});
  showLoad(); loading=true;
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:2000,system:SYS,messages:hist})});
    const d=await r.json();
    hideLoad();
    if(d?.content?.[0]){
      const txt=d.content[0].text||'';
      hist.push({role:'assistant',content:txt});
      addMsg('ai',txt);
      if(txt.includes('【タイトル】')){const pg=getProgress();pg.xp=(pg.xp||0)+XP.story;saveProgress(pg);showToast(`+${XP.story} XP ⚡ 小説を読んだ`);}
    }else if(d?.error){addMsg('ai',`⚠️ APIエラー: ${d.error}`);}
    else{addMsg('ai','エラーが発生しました。もう一度お試しください。');}
  }catch(err){hideLoad();addMsg('ai',`⚠️ 通信エラー: ${err.message}`);}
  loading=false;
}

async function sendMsg(){
  if(loading)return;
  const inp=document.getElementById('ui');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',txt);
  await callAI(txt);
}

function quickSend(txt){
  if(loading)return;
  addMsg('user',txt);
  callAI(txt);
  scrollBottom();
}

ui.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('lkinput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupWord();});
