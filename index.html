<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スターウォーズ学習アカデミー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root {
  --void: #02050e;
  --deep: #060c1a;
  --nebula: #0a1628;
  --star-blue: #1a3560;
  --saber: #4fc3f7;
  --saber-glow: rgba(79,195,247,0.35);
  --gold: #ffd740;
  --gold-glow: rgba(255,215,64,0.4);
  --green: #69f0ae;
  --text: #dde8f5;
  --text-dim: #6b85b5;
  --text-muted: #3a4f78;
  --border: rgba(79,195,247,0.12);
  --border-active: rgba(79,195,247,0.4);
  --left-w: 200px;
  --right-w: 280px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Noto Sans JP',sans-serif; background:var(--void); color:var(--text); overflow:hidden; }

/* Stars */
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.s { position:absolute; background:#fff; border-radius:50%; animation:tw var(--d) ease-in-out infinite; animation-delay:var(--dl); }
@keyframes tw { 0%,100%{opacity:var(--o)} 50%{opacity:0.05} }

/* Layout */
#layout {
  position:relative; z-index:1;
  display:grid;
  grid-template-columns: var(--left-w) 1fr var(--right-w);
  grid-template-rows: 52px 1fr;
  height:100vh;
}

/* Header */
#hdr {
  grid-column:1/4; grid-row:1;
  display:flex; align-items:center; justify-content:center; gap:16px;
  border-bottom:1px solid var(--border);
  background:rgba(2,5,14,0.95); backdrop-filter:blur(12px);
  padding:0 20px;
}
.hdr-line { height:1px; flex:1; max-width:100px; background:linear-gradient(90deg,transparent,var(--saber)); }
.hdr-line.r { background:linear-gradient(90deg,var(--saber),transparent); }
.hdr-title { font-family:'Noto Serif JP',serif; font-size:16px; font-weight:900; letter-spacing:0.2em; color:var(--gold); text-shadow:0 0 16px var(--gold-glow); white-space:nowrap; }

/* LEFT */
#left {
  grid-column:1; grid-row:2;
  border-right:1px solid var(--border);
  background:var(--deep);
  display:flex; flex-direction:column;
  padding:18px 10px 18px;
  gap:8px; overflow-y:auto;
}
.sec-label { font-size:9px; letter-spacing:0.25em; color:var(--text-muted); text-transform:uppercase; font-family:'DotGothic16',monospace; padding:0 6px; margin-bottom:2px; }
.nav-btn {
  display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px;
  border-radius:9px; border:1px solid var(--border); background:transparent;
  color:var(--text-dim); font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.18s; text-align:left;
}
.nav-btn:hover { background:rgba(79,195,247,0.08); border-color:var(--border-active); color:var(--saber); box-shadow:0 0 10px rgba(79,195,247,0.1); }
.nav-btn .ic { font-size:15px; flex-shrink:0; }
.divider { height:1px; background:var(--border); margin:4px 0; }
#stock-left { flex:1; overflow-y:auto; padding:2px 0; }
.sw {
  display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:6px;
  font-size:12px; color:var(--saber); cursor:pointer; transition:background 0.15s;
}
.sw:hover { background:rgba(79,195,247,0.08); }
.sw::before { content:''; width:4px; height:4px; background:var(--saber); border-radius:50%; flex-shrink:0; box-shadow:0 0 4px var(--saber); }
.sw-empty { font-size:11px; color:var(--text-muted); padding:4px 8px; }

/* MAIN */
#main { grid-column:2; grid-row:2; display:flex; flex-direction:column; overflow:hidden; }
#chat { flex:1; overflow-y:auto; padding:24px 28px 8px; display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth; }

.msg { display:flex; gap:10px; animation:mi 0.28s ease; }
@keyframes mi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:3px; }
.msg.ai .av { background:linear-gradient(135deg,#1a3a6e,#0d1f45); border:1px solid var(--border-active); box-shadow:0 0 8px var(--saber-glow); }
.msg.user .av { background:linear-gradient(135deg,#1a3d1a,#0d220d); border:1px solid rgba(105,240,174,0.3); }
.bbl { max-width:calc(100% - 48px); padding:13px 17px; border-radius:16px; font-size:14px; line-height:1.85; white-space:pre-wrap; }
.msg.ai .bbl { background:rgba(10,22,40,0.75); border:1px solid var(--border); border-top-left-radius:4px; }
.msg.user .bbl { background:rgba(79,195,247,0.1); border:1px solid rgba(79,195,247,0.2); border-top-right-radius:4px; color:#c8e6ff; }

.dots { display:inline-flex; gap:4px; padding:4px 0; }
.dots span { width:6px; height:6px; background:var(--saber); border-radius:50%; animation:dot 1.2s ease-in-out infinite; }
.dots span:nth-child(2){animation-delay:0.2s} .dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }

#input-bar { padding:12px 28px 16px; background:linear-gradient(to top,var(--void) 60%,transparent); }
.irow { display:flex; gap:8px; background:var(--nebula); border:1px solid var(--border); border-radius:26px; padding:6px 6px 6px 18px; transition:all 0.2s; }
.irow:focus-within { border-color:var(--border-active); box-shadow:0 0 18px rgba(79,195,247,0.1); }
#ui { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; resize:none; max-height:96px; min-height:34px; line-height:1.6; padding:5px 0; }
#ui::placeholder { color:var(--text-muted); }
#sb { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--saber),var(--star-blue)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; box-shadow:0 0 10px var(--saber-glow); }
#sb:hover { transform:scale(1.07); box-shadow:0 0 20px rgba(79,195,247,0.5); }
#sb svg { color:white; }

/* RIGHT */
#right { grid-column:3; grid-row:2; border-left:1px solid var(--border); background:var(--deep); display:flex; flex-direction:column; overflow:hidden; }
.rhdr { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
.rtitle { font-size:10px; letter-spacing:0.22em; color:var(--text-muted); text-transform:uppercase; font-family:'DotGothic16',monospace; margin-bottom:10px; }
#lkform { display:flex; gap:6px; }
#lkinput { flex:1; background:rgba(0,0,0,0.35); border:1px solid var(--border); border-radius:8px; padding:7px 11px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; min-width:0; }
#lkinput:focus { border-color:var(--border-active); }
#lkinput::placeholder { color:var(--text-muted); }
#lkbtn { padding:7px 11px; border-radius:8px; background:rgba(79,195,247,0.12); border:1px solid var(--border-active); color:var(--saber); font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.18s; }
#lkbtn:hover { background:rgba(79,195,247,0.22); }

#rscroll { flex:1; overflow-y:auto; padding:14px 14px; display:flex; flex-direction:column; gap:10px; }
.wcard { background:rgba(79,195,247,0.04); border:1px solid var(--border); border-radius:12px; padding:14px; animation:ci 0.25s ease; }
@keyframes ci { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.wc-title { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; color:var(--gold); text-shadow:0 0 10px var(--gold-glow); margin-bottom:11px; }
.wc-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:7px; font-size:12px; line-height:1.65; }
.wc-lbl { font-family:'DotGothic16',monospace; font-size:9px; letter-spacing:0.15em; color:var(--saber); text-transform:uppercase; padding:2px 5px; border:1px solid var(--border-active); border-radius:4px; flex-shrink:0; margin-top:1px; }
.wc-val { color:var(--text); }
.wc-stocked { margin-top:10px; padding-top:8px; border-top:1px solid var(--border); font-size:10px; color:var(--green); display:flex; align-items:center; gap:5px; }
.rloading { display:flex; align-items:center; gap:8px; padding:8px 2px; font-size:12px; color:var(--text-muted); }
.rhint { background:rgba(255,215,64,0.04); border:1px dashed rgba(255,215,64,0.15); border-radius:10px; padding:14px; font-size:12px; color:var(--text-muted); line-height:1.8; }
.rhint strong { color:var(--gold); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--star-blue); border-radius:2px; }

@media (max-width:768px) {
  :root { --left-w:50px; --right-w:50px; }
  .nav-btn span:not(.ic) { display:none; }
  .sec-label { display:none; }
  #stock-left { display:none; }
  .rtitle { display:none; }
  #lkform { flex-direction:column; }
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="layout">

  <header id="hdr">
    <div class="hdr-line"></div>
    <div class="hdr-title">🌌 銀河学習アカデミー</div>
    <div class="hdr-line r"></div>
  </header>

  <!-- LEFT -->
  <aside id="left">
    <div class="sec-label">メニュー</div>
    <button class="nav-btn" onclick="quickSend('小説を生成して')"><span class="ic">📖</span><span>小説を生成して</span></button>
    <button class="nav-btn" onclick="quickSend('問題を出して')"><span class="ic">📝</span><span>問題を出して</span></button>
    <button class="nav-btn" onclick="quickSend('新しい小説')"><span class="ic">🔄</span><span>新しい小説</span></button>
    <div class="divider"></div>
    <div class="sec-label">語句ストック</div>
    <div id="stock-left"><div class="sw-empty">まだありません</div></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="chat"></div>
    <div id="input-bar">
      <div class="irow">
        <textarea id="ui" placeholder="答えを入力、または自由にメッセージを送れます..." rows="1"></textarea>
        <button id="sb" onclick="sendMsg()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- RIGHT -->
  <aside id="right">
    <div class="rhdr">
      <div class="rtitle">🔍 語句・漢字を調べる</div>
      <div id="lkform">
        <input id="lkinput" type="text" placeholder="例：葛藤、凛々しい…" />
        <button id="lkbtn" onclick="lookupWord()">調べる</button>
      </div>
    </div>
    <div id="rscroll">
      <div class="rhint">
        <strong>使い方</strong><br>
        小説を読んでいてわからない語句・漢字を上の入力欄に入力して「調べる」を押してください。<br><br>
        読み・意味・例文をここに表示します。調べた語句は自動でストックされ、問題に出題されます。
      </div>
    </div>
  </aside>

</div>
<script>
// Stars
const sf=document.getElementById('stars');
for(let i=0;i<140;i++){const s=document.createElement('div');s.className='s';const z=Math.random()*1.8+0.3;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${z}px;height:${z}px;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s;--o:${0.15+Math.random()*0.7}`;sf.appendChild(s);}

// State
let hist=[], stocked=[], loading=false, looking=false;
const WORKER='https://galaxy-academy-proxy.lucky-star-001.workers.dev';

const SYS=`あなたは「銀河学習アカデミーの先生」です。スター・ウォーズ二次創作小説を使った中学受験語彙トレーニングシステムを運営しています。

## ① 小説生成機能
トリガー：「小説を生成して」「スター・ウォーズ小説を作って」「今日の物語を始めよう」「新しい小説」

登場人物リスト（1〜2名をランダムに選ぶ）：
ルーク・スカイウォーカー、レイア・オーガナ、レイ、カイロ・レン、ヨーダ、ダース・ベイダー、アナキン・スカイウォーカー、オビ＝ワン・ケノービ、ハン・ソロ、R2-D2、BB-8

テーマ候補（毎回ランダムに1つ、連続同テーマ不可）：
1. ジェダイ修行の試練と葛藤
2. 帝国軍の秘密基地への潜入作戦
3. 砂漠の星タトゥイーンでの謎の出来事
4. 親子・師弟の別れと再会
5. 宇宙船内での緊急事態
6. 銀河共和国を揺るがす陰謀
7. 見知らぬ星での出会いと冒険
8. 最後の決戦と希望の光

文章ルール：
- 文字数：本文1000〜1200文字（タイトルを除く）
- 漢字レベル：中学受験範囲のみ
- 語彙：以下を自然に盛り込む（緊迫・勇敢・克服・凛々しい・懸命・逆境・秘策・覚悟・葛藤・貫徹・沈着・威厳・奮起・慈悲・堅固・威圧など）
- 文体：小学校高学年〜中学生向け三人称視点、起承転結、読後感が清々しいもの

出力フォーマット：
【タイトル】〇〇〇〇

（本文1000〜1200文字）

---
📖 右側のパネルでわからない語句を調べながら読んでください。
✅ 問題に進む場合は左の「問題を出して」ボタンを押してください。

## ② 問題出題機能
トリガー：「問題を出して」「テストして」「クイズ開始」「問題に進む」

問題1：要約4択問題（小説の内容に基づく）
問題2以降：ストックされた語句から1問ずつ（読みがな・意味・使い方のいずれかをランダムに選択）

採点ルール：
- 読みがな：完全一致で正解
- 意味：キーワード含有で正解
- 使い方：語句が正しく使われていれば正解
- 正解時：「素晴らしい！フォースを感じる！」などスター・ウォーズ表現
- 不正解時：「惜しい！次は必ず覚えられる！」と前向きに

## ③ 結果・ランク発表
全問終了後：
━━━━━━━━━━━━━━━━━━
🏆 本日の結果
━━━━━━━━━━━━━━━━━━
正解数：〇 / 〇問  正答率：〇〇%
【ジェダイランク】称号

ランク基準：90%以上→グランド・マスター、70〜89%→ジェダイ・マスター、50〜69%→ジェダイ・ナイト、30〜49%→パダワン、30%未満→ヤング・パダワン

## 注意事項
- 対象年齢は小学校高学年〜中学生。暴力・不適切表現は一切含めない
- スター・ウォーズは二次創作として著作権に配慮（固有名詞・世界観の参照のみ）
- 日本語で回答する（固有名詞以外）`;

const LKSYS=`あなたは語句・漢字の解説をする先生です。ユーザーが語句を送ったら、必ず以下のJSON形式のみで返答してください。他の文字・記号・マークダウンは一切含めないでください：
{"word":"語句","reading":"よみがな（ひらがな）","meaning":"意味の説明（中学生向けに1〜2文）","example":"その語句を使った自然な例文"}`;

// Helpers
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollBottom(){const c=document.getElementById('chat');c.scrollTo({top:c.scrollHeight,behavior:'smooth'});}

function addMsg(role,text){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  d.innerHTML=`<div class="av">${role==='ai'?'🌌':'👤'}</div><div class="bbl">${esc(text)}</div>`;
  c.appendChild(d);
  scrollBottom();
}

function showLoad(){
  const c=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg ai';d.id='ldg';
  d.innerHTML='<div class="av">🌌</div><div class="bbl"><div class="dots"><span></span><span></span><span></span></div></div>';
  c.appendChild(d);scrollBottom();
}
function hideLoad(){document.getElementById('ldg')?.remove();}

function updateStock(){
  const el=document.getElementById('stock-left');
  el.innerHTML=stocked.length===0
    ?'<div class="sw-empty">まだありません</div>'
    :stocked.map(w=>`<div class="sw" onclick="prefill('${esc(w)}')">${esc(w)}</div>`).join('');
}
function prefill(w){document.getElementById('lkinput').value=w;document.getElementById('lkinput').focus();}

function showRLoad(){
  const rs=document.getElementById('rscroll');
  const d=document.createElement('div');d.className='rloading';d.id='rldg';
  d.innerHTML='<div class="dots"><span></span><span></span><span></span></div><span>調べています…</span>';
  rs.insertBefore(d,rs.firstChild);
}
function hideRLoad(){document.getElementById('rldg')?.remove();}

function addCard(data,isNew){
  const rs=document.getElementById('rscroll');
  rs.querySelector('.rhint')?.remove();
  const c=document.createElement('div');c.className='wcard';
  c.innerHTML=`
    <div class="wc-title">${esc(data.word)}</div>
    <div class="wc-row"><span class="wc-lbl">読み</span><span class="wc-val">${esc(data.reading||'―')}</span></div>
    <div class="wc-row"><span class="wc-lbl">意味</span><span class="wc-val">${esc(data.meaning||'―')}</span></div>
    <div class="wc-row"><span class="wc-lbl">例文</span><span class="wc-val">${esc(data.example||'―')}</span></div>
    ${isNew?'<div class="wc-stocked">💾 ストック済み！問題に出題されます</div>':''}
  `;
  rs.insertBefore(c,rs.firstChild);
  rs.scrollTo({top:0,behavior:'smooth'});
}

// Lookup
async function lookupWord(){
  const inp=document.getElementById('lkinput');
  const word=inp.value.trim();
  if(!word||looking)return;
  inp.value=''; looking=true;
  showRLoad();
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:400,system:LKSYS,messages:[{role:'user',content:word}]})});
    const d=await r.json();
    hideRLoad();
    let txt=d?.content?.[0]?.text||'';
    txt=txt.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(txt);}catch(e){parsed={word,reading:'―',meaning:txt||'解析できませんでした',example:''};}
    const isNew=!stocked.includes(parsed.word);
    if(isNew){stocked.push(parsed.word);updateStock();}
    addCard(parsed,isNew);
  }catch(err){
    hideRLoad();
    const rs=document.getElementById('rscroll');
    const e=document.createElement('div');e.className='rhint';e.style.borderColor='rgba(255,82,82,0.3)';
    e.innerHTML=`⚠️ エラー: ${esc(err.message)}`;rs.insertBefore(e,rs.firstChild);
  }
  looking=false;
}

// Main chat
async function callAI(msg){
  hist.push({role:'user',content:msg});
  showLoad(); loading=true;
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:2000,system:SYS,messages:hist})});
    const d=await r.json();
    hideLoad();
    if(d?.content?.[0]){
      const txt=d.content[0].text||'';
      hist.push({role:'assistant',content:txt});
      addMsg('ai',txt);
    }else if(d?.error){addMsg('ai',`⚠️ APIエラー: ${d.error}`);}
    else{addMsg('ai','エラーが発生しました。もう一度お試しください。');}
  }catch(err){hideLoad();addMsg('ai',`⚠️ 通信エラー: ${err.message}`);}
  loading=false;
}

async function sendMsg(){
  if(loading)return;
  const inp=document.getElementById('ui');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',txt);
  await callAI(txt);
}

function quickSend(txt){
  if(loading)return;
  addMsg('user',txt);
  callAI(txt);
  scrollBottom();
}

// Input handlers
const ui=document.getElementById('ui');
ui.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px';});
ui.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
